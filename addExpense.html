<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Добавить расход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebarLogo">Трекер расходов</div>
      <a href="index.html" class="navItem">Главная</a>
      <a href="expenses.html" class="navItem">Расходы</a>
      <a href="addExpense.html" class="navItem">Добавить</a>
    </div>
    <div class="main">
      <div class="topbar">
        <span id="formTitle">Добавить расход</span>
      </div>
      <div class="content">
        <div class="card">
          <div class="formGrid">
            <div class="field">
              <label>Сумма</label>
              <input type="number" id="amount" placeholder="0">
            </div>
            <div class="field">
              <label>Дата</label>
              <input type="date" id="date">
            </div>
            <div class="field">
              <label>Категория</label>
              <select id="category">
                <option>Еда</option>
                <option>Транспорт</option>
                <option>Развлечения</option>
                <option>Здоровье</option>
                <option>Одежда</option>
                <option>Прочее</option>
              </select>
            </div>
            <div class="field">
              <label>Описание</label>
              <input type="text" id="description" placeholder="На что?">
            </div>
          </div>
          <div class="error" id="error"></div>
          <button class="btn" onclick="saveExpense()">Сохранить</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
